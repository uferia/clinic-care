name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  frontend:
    name: Angular — tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx ng test --watch=false
      - run: npx ng build

  database:
    name: Supabase — pgTAP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # Applies every migration to a fresh database, so a migration that only
      # works against our local box fails here rather than on deploy.
      - run: supabase start
      - run: supabase test db
      - if: always()
        run: supabase stop
